<!DOCTYPE html>
<html>
<head>
    <title>Perform Car Loan Calculation</title>
</head>
<body>
    <h2>Perform Car Loan Calculation</h2>

    <form action="processCalculateCarLoan.jsp" method="post">
        <label for="loanAmount">Loan Amount:</label>
        <input type="text" id="loanAmount" name="loanAmount" value=""><br><br>

        <label for="loanPeriod">Period:</label>
        <select id="loanPeriod" name="loanPeriod">
            <option value="3">3 years</option>
            <option value="5">5 years</option>
            <option value="7">7 years</option>
            <option value="10">10 years</option>
        </select><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Cancel">
    </form>
