<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 100vh;">
    <div class="card shadow-lg border-0 rounded-4 p-4 p-md-5"
         style="max-width: 440px; width: 100%;">
        <h2 class="fw-bold text-center mb-4">Student Login</h2>

        <form action="UserServlet" method="POST">
            <input type="hidden" name="action" value="login">

            <div class="mb-3">
                <label class="form-label fw-semibold">Matric No</label>
                <input type="text" name="matricNo" class="form-control"
                       placeholder="e.g. A12345" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Your password" required>
            </div>

            <button type="submit" class="btn btn-dark w-100 fw-semibold py-2">
                Login
            </button>
            <p class="text-center mt-3 text-muted">
                No account? <a href="register.html">Register here</a>
            </p>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
