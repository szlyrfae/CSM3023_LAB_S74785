<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Currency Conversion</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>Use JSP Declaration Tag, JSP Scriptlet and JSP Expression in Application</h1>

            <div class="card">
                <h2 class="form-title">Currency Conversion</h2>
                <form action="processCurrency.jsp" method="post">

                    <div class="form-group">
                        <label for="amount">Amount (in RM)</label>
                        <input type="number" id="amount" name="amount" placeholder="[in RM]" step="0.01">
                    </div>

                    <div class="form-group">
                        <label for="currencyType">Convert to</label>
                        <select id="currencyType" name="currencyType">
                            <option value="1">USD</option>
                            <option value="2">EURO</option>
                            <option value="3">JPY</option>
                            <option value="4">SGD</option>
                        </select>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-submit">Submit</button>
                        <button type="reset" class="btn btn-cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
